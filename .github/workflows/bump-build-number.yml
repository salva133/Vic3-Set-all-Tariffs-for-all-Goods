name: Bump Build Number

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  bump-build-number:
    if: github.event.pull_request.merged == true
    uses: salva133/My-Workflows/.github/workflows/bump-build-number.yml@b50545973ea68303c6a280235f9112d958bb3298
    with:
      pr_number: ${{ github.event.pull_request.number }}
