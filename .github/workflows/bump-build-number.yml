name: Bump Build Number

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  bump-build-number:
    if: github.event.pull_request.merged == true
    uses: salva133/My-Workflows/.github/workflows/bump-build-number.yml@8499a330dad354724615161a9dfd70ea8c71f80e
    with:
      pr_number: ${{ github.event.pull_request.number }}
